services:
  mcp-server:
    build:
      context: ./mcp-server
    environment:
      FUSIONAUTH_URL: ${FUSIONAUTH_URL:-https://fusionauth.ritza.co}
      FUSIONAUTH_EXTERNAL_URL: ${FUSIONAUTH_EXTERNAL_URL:-https://fusionauth.ritza.co}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
